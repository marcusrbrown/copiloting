---
name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_COLOR: true

jobs:
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      nodejs: ${{ steps.filter.outputs.nodejs }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            nodejs:
              - '**.ts'
              - '**.svelte'
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - mise.toml
              - prettier.config.js
              - .github/actions/**
              - .github/workflows/ci.yaml
            python:
              - '**.py'
              - pyproject.toml
              - poetry.lock
              - mise.toml
              - .github/actions/**
              - .github/workflows/ci.yaml

  build-nodejs:
    name: Build Node.js
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.nodejs == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache ESLint
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules/.cache/.eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('**/*.ts', '**/*.svelte') }}
          restore-keys: |
            eslint-${{ runner.os }}-

      - name: Cache SvelteKit build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: course/pdf-dist/client/.svelte-kit
          key: svelte-kit-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            svelte-kit-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies --prefer-offline

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  build-python:
    name: Build Python
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.python == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Cache Poetry dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .venv
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --with dev,main,pdf-dist,sections

      - name: Test
        run: poetry run pytest
